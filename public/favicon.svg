<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Red gradient for the bullet body -->
    <linearGradient id="bullet-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <!-- Dark metallic gradient for the casing -->
    <linearGradient id="case-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="30%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Crosshair glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Crosshair ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.4" filter="url(#glow)"/>

  <!-- Crosshair lines -->
  <g stroke="#ef4444" stroke-width="2" opacity="0.5" filter="url(#glow)">
    <!-- Top -->
    <line x1="256" y1="76" x2="256" y2="176"/>
    <!-- Bottom -->
    <line x1="256" y1="336" x2="256" y2="436"/>
    <!-- Left -->
    <line x1="76" y1="256" x2="176" y2="256"/>
    <!-- Right -->
    <line x1="336" y1="256" x2="436" y2="256"/>
  </g>

  <!-- Mil-dot marks on crosshair -->
  <g fill="#ef4444" opacity="0.6">
    <circle cx="256" cy="116" r="3"/>
    <circle cx="256" cy="146" r="3"/>
    <circle cx="256" cy="366" r="3"/>
    <circle cx="256" cy="396" r="3"/>
    <circle cx="116" cy="256" r="3"/>
    <circle cx="146" cy="256" r="3"/>
    <circle cx="366" cy="256" r="3"/>
    <circle cx="396" cy="256" r="3"/>
  </g>

  <!-- Bullet - angled, center of crosshair -->
  <g transform="translate(256, 256) rotate(-45)" filter="url(#shadow)">
    <!-- Bullet ogive (tip) -->
    <path d="M-12,-100 Q-12,-140 0,-160 Q12,-140 12,-100 Z" fill="url(#bullet-grad)"/>
    <!-- Bullet jacket body -->
    <rect x="-12" y="-100" width="24" height="70" rx="2" fill="url(#bullet-grad)"/>
    <!-- Cannelure groove -->
    <rect x="-13" y="-45" width="26" height="4" rx="1" fill="#991b1b" opacity="0.6"/>
    <!-- Case neck -->
    <rect x="-13" y="-30" width="26" height="15" rx="1" fill="#b45309"/>
    <!-- Brass casing -->
    <rect x="-16" y="-15" width="32" height="75" rx="3" fill="url(#case-grad)"/>
    <!-- Case rim -->
    <rect x="-18" y="58" width="36" height="6" rx="2" fill="#92400e"/>
    <!-- Primer -->
    <circle cx="0" cy="64" r="6" fill="#78350f" stroke="#92400e" stroke-width="1"/>
    <!-- Case shine highlight -->
    <rect x="-8" y="-10" width="4" height="60" rx="2" fill="#fbbf24" opacity="0.3"/>
    <!-- Bullet jacket shine -->
    <rect x="-5" y="-95" width="3" height="55" rx="1.5" fill="#fca5a5" opacity="0.4"/>
  </g>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="4" fill="#ef4444" filter="url(#glow)"/>

  <!-- BF text -->
  <text x="256" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="#ef4444" letter-spacing="6" opacity="0.8">BF</text>
</svg>
